services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/vendor
      - ./.env.docker:/app/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'ok';"]
      interval: 10s
      timeout: 5s
      retries: 3

  queue:
    build: .
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - .:/app
      - /app/vendor
      - ./.env.docker:/app/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: laravelrag
      POSTGRES_USER: laravelrag
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravelrag -d laravelrag"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling llama3.2:3b..."
        ollama pull llama3.2:3b
        echo "Pulling nomic-embed-text..."
        ollama pull nomic-embed-text
        echo "Models ready!"
    restart: "no"

volumes:
  pgdata:
  ollama_data:
